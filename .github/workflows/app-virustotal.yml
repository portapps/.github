name: app-virustotal

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      vt_api_key:
        required: true
      vt_monitor_api_key:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to write GitHub Release body
    steps:
      -
        name: Prepare
        run: |
          echo "CURDATE=$(date -u +'%Y%m%d')" >> $GITHUB_ENV
      -
        name: VirusTotal Monitor Scan
        uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5.0.0
        with:
          vt_api_key: ${{ secrets.vt_monitor_api_key }}
          vt_monitor: true
          monitor_path: /portapps/${{ env.CURDATE }}/${{ github.event.repository.name }}-${{ github.event.release.tag_name }}
          update_release_body: false
          github_token: ${{ github.token }}
          files: |
            ${{ github.event.repository.name }}-(win32|win64).exe
      -
        name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5.0.0
        with:
          vt_api_key: ${{ secrets.vt_api_key }}
          update_release_body: true
          github_token: ${{ github.token }}
          files: |
            ${{ github.event.repository.name }}-(win32|win64).exe
