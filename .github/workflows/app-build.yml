name: app-build

on:
  workflow_call:
    inputs:
      go_version:
        required: false
        type: string
        default: '1.26'
      node_version:
        required: false
        type: string
        default: '20'
      java_version:
        required: false
        type: string
        default: '11'
      ant_version:
        required: false
        type: string
        default: '1.10.15'
      java_tool_options:
        required: false
        type: string
        default: '-Dfile.encoding=UTF8'

env:
  # don't auto-upgrade the gotoolchain
  # https://github.com/docker-library/golang/issues/472
  GOTOOLCHAIN: local

jobs:
  build:
    runs-on: windows-latest
    env:
      GO_VERSION: ${{ inputs.go_version }}
      NODE_VERSION: ${{ inputs.node_version }}
      JAVA_VERSION: ${{ inputs.java_version }}
      ANT_VERSION: ${{ inputs.ant_version }}
      JAVA_TOOL_OPTIONS: ${{ inputs.java_tool_options }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      -
        name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      -
        name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: adopt
          java-version: ${{ env.JAVA_VERSION }}
      -
        name: Set up ANT
        uses: cedx/setup-ant@bf462f868e5668e7fb19eccce36e9941afce116a # v6.1.0
        with:
          version: ${{ env.ANT_VERSION }}
      -
        name: Java version
        run: |
          java -XshowSettings:properties -version
      -
        name: ANT version
        run: |
          ant -version
      -
        name: Node version
        run: |
          node --version
      -
        name: Config
        run: |
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          echo "$(go env GOPATH)/bin/windows_386" >> $GITHUB_PATH
          echo "PORTAPPS_VERSION=$(cat go.mod | grep github.com/portapps/portapps | awk '{print $NF}')" >> $GITHUB_ENV
          echo "PORTAPPS_DIR=./.portapps" >> $GITHUB_ENV
        shell: bash
      -
        name: Checkout core
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: portapps/portapps
          ref: ${{ env.PORTAPPS_VERSION }}
          path: ${{ env.PORTAPPS_DIR }}
      -
        name: Cache Portapps bin
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.PORTAPPS_DIR }}/bin
          key: portapps-bin-${{ env.PORTAPPS_VERSION }}
      -
        name: Build
        run: |
          ant release -Dcore.dir=${{ env.PORTAPPS_DIR }}
        shell: bash
      -
        name: Upload assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.event.repository.name }}
          path: bin/release/*

  release:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      -
        name: Prepare
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "GIT_TAGNAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
      -
        name: Download assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.event.repository.name }}
          path: ./bin/release
      -
        name: List artifacts
        run: |
          tree -nh ./bin/release
      -
        name: GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: |
            bin/release/*
          name: ${{ env.GIT_TAGNAME }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
